<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>媽媽瑪莉 - 電影包場</title>
    <meta name="description" content="Mother Mary 電影包場活動更新。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,400..900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Intro: four lines of text play in sequence, then the curtain lifts -->
    <div class="intro" aria-hidden="true">
      <div class="intro__line"></div>
    </div>

    <main class="activity">
      <!-- Red "Spooky Action" disc, bleeding off the top edge -->
      <div class="disc" aria-hidden="true">
        <img class="disc__art" src="/cd-cover.png" alt="" />
      </div>

      <!-- Headline -->
      <h1 class="title">
        <span>Mother</span>
        <span>Mary</span>
      </h1>

      <!-- Activity updates -->
      <nav class="actions" aria-label="活動更新">
        <a class="pill" href="https://app.notion.com/p/Sam-35969158a8cc8092afd7e7f7af464b14?source=copy_link">
          <span>6/14｜Sam新房入厝趴踢</span>
          <svg
            class="pill__arrow"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </a>
        <a class="pill" href="https://app.notion.com/p/36e69158a8cc804098a0fcf50ea3bfe0?source=copy_link">
          <span>7/18｜一起在大影格看《魅影巨星》</span>
          <svg
            class="pill__arrow"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </a>
      </nav>

      <!-- Rotating "scroll down" button -->
      <button class="scroll-btn" type="button" aria-label="二招報名">
        <svg class="scroll-btn__ring" viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <path id="scrollCircle" d="M 50,50 m -37,0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" />
          </defs>
          <text>
            <textPath href="#scrollCircle" startOffset="0" textLength="232.5" lengthAdjust="spacing">ET TICKETS · GET TICKETS · G</textPath>
          </text>
        </svg>
        <span class="scroll-btn__star" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 1 L14 10 L23 12 L14 14 L12 23 L10 14 L1 12 L10 10 Z" />
          </svg>
        </span>
      </button>
    </main>

    <footer class="legal">本網站僅作為非營利電影包場活動資訊使用，相關電影名稱、標誌及宣傳素材之權利均屬原權利人所有。</footer>

    <script type="module" src="/src/activity.js"></script>
  </body>
</html>
